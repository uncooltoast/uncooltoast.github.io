  <script>
    // #region bell shenanigans
    /** simple class to represent a bell */
    class Bell {
      constructor({ src, label, defaultVolume, author, authorName, authorDescription, originalSource, license, licenseUrl }) {
        this.src = src;
        this.label = label;
        this.defaultVolume = defaultVolume;
        this.author = author;
        this.authorName = authorName;
        this.authorDescription = authorDescription;
        this.originalSource = originalSource;
        this.license = license;
        this.licenseUrl = licenseUrl;
        this.player = new Audio(src);
        this.player.volume = defaultVolume;
      }

      ring(volume) {
        this.player.currentTime = 0;
        this.player.volume = volume ?? this.defaultVolume;
        this.player.play();
      }

      shhhhh() {
        this.player.pause();
      }
    }

    const SoftWooden = new Bell({

    const BrightMetal = new Bell({
      // sauce deets
      author: 'giddster',
      authorDescription: [
        'Wind chimes being obnoxiously loud. Could be used as a "the storm is coming" indication in the background sound setting of your choice. Recorded in isolation indoors as the wind would\'ve killed the recording.',

      originalSource: 'https://freesound.org/people/giddster/sounds/437336/',
      license: 'CC0',
      licenseUrl: 'https://creativecommons.org/publicdomain/zero/1.0/',

      // uncooltoast bell ringer deets
      src: '../assets/31s-bright-metal-wind-chimes-cc0-from-freesound.org-giddster-sounds-437336.mp3',
      label: 'BRIGHT: metal wind chimes (31s)',
      defaultVolume: 0.3,
    });
  
    const BELLS = {
      LowGong,
      MediumBright,
      HighBright,
      BoldBright,
      SingingGentle,
      SingingEscalating,
      ChurchEscalating,
      SoftWooden,
      BrightMetal,

    // #endregion bell shenanigans

    /** grab an element from the DOM */
    function accessDom(id) {
      return document.getElementById(id);
    }

    /** switches the bell for a given player */
    function switchBell(playerId, whichBell) {
      const bell = BELLS[whichBell];
      const player = accessDom(playerId);
      player.pause();
      player.src = bell.src;
      player.load();
      player.volume = bell.defaultVolume;
      const prefix = playerId.replace('-preview-player', '');
      setFormValue(prefix + '-volume', bell.defaultVolume.toFixed(1));
    }

    /** sets the volume of a given player */
    function setPreviewVolume(id, value) {
      accessDom(id).volume = parseFloat(value);
    }

    /** sets the value of a given form element */
    function setFormValue(id, value) {
      accessDom(id).value = value;
    }

    /** clears all form state, mostly necessary to avoid weird state issues on page reload */
    function resetPageState() {
      document.querySelectorAll('form').forEach(f => f.reset());
      document.querySelectorAll('select').forEach(s => { s.selectedIndex = 0; });

      switchBell('timer-preview-player', 'HighBright');
      setFormValue('timer-bell', 'HighBright');
      setFormValue('timer-period', '30');
      setFormValue('timer-volume', '0.4');
      setFormValue('timer-start-at', '');
      setPreviewVolume('timer-preview-player', 0.4);

      switchBell('alarm-preview-player', 'HighBright');
      setFormValue('alarm-bell', 'HighBright');
      setFormValue('alarm-volume', '0.4');
      setFormValue('alarm-time', '');
      setPreviewVolume('alarm-preview-player', 0.4);
    }

    document.addEventListener('DOMContentLoaded', resetPageState);

    const activeTimers = [];

    /** formats milliseconds into a friendlier time string */
    function formatCountdown(ms) {
      const seconds = Math.max(0, Math.ceil(ms / 1000));
      const hour = Math.floor(seconds / 3600);
      const minute = Math.floor((seconds % 3600) / 60);
      const second = seconds % 60;
      if (hour > 0) return hour + ':' + String(minute).padStart(2, '0') + ':' + String(second).padStart(2, '0');
      return minute + ':' + String(second).padStart(2, '0');
    }

    /** updates the countdown display for all active timers */
    function updateCountdowns() {
      const now = Date.now();
      for (const timer of activeTimers) {
        const element = accessDom('countdown-' + timer.id);
        if (element) element.textContent = formatCountdown(timer.nextRing - now);
      }
    }

    setInterval(updateCountdowns, 1000);

    let spawnCounter = 0;

    /** creates a new periodic bell timer */
    function spawnPeriodic(bell, minutes, delayMs, volume = bell.defaultVolume) {
      const periodMs = minutes * 60 * 1000;
      const id = Date.now() + (spawnCounter++);
      const nextRing = Date.now() + (delayMs > 0 ? delayMs : periodMs);
      let intervalId;

      const ringBell = () => bell.ring(volume);

      if (delayMs > 0) {
        intervalId = setTimeout(() => {
          ringBell();
          const entry = activeTimers.find(t => t.id === id);
          if (!entry) return;
          entry.nextRing = Date.now() + periodMs;
          const intervalId = setInterval(() => {
            ringBell();
            const entry = activeTimers.find(t => t.id === id);
            if (entry) { entry.nextRing = Date.now() + periodMs; entry.intervalId = intervalId; }
          }, periodMs);
          entry.intervalId = intervalId;
        }, delayMs);
      } else {
        intervalId = setInterval(() => {
          ringBell();
          const entry = activeTimers.find(t => t.id === id);
          if (entry) entry.nextRing = Date.now() + periodMs;
        }, periodMs);
      }

      activeTimers.push({ id, intervalId, nextRing, oneShot: false });
      const periodLabel = `every ${ minutes } min`;
      spawnTimer(id, bell.label, periodLabel, Math.round(volume * 100));
    }

    /** creates a new timed bell alarm */
    function spawnAlarm(bell, timeStr, volume = bell.defaultVolume) {
      const [hours, mins] = timeStr.split(':').map(Number);
      const now = new Date();
      const target = new Date(now);
      target.setHours(hours, mins, 0, 0);
      if (target <= now) target.setDate(target.getDate() + 1);
      const delayMs = target - now;

      const id = Date.now() + (spawnCounter++);
      const nextRing = Date.now() + delayMs;

      const timeoutId = setTimeout(() => {
        bell.ring(volume);
        stopTimer(id);
      }, delayMs);

      activeTimers.push({ id, intervalId: timeoutId, nextRing, oneShot: true });
      const displayTime = target.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      spawnTimer(id, bell.label, `at ${ displayTime }`, Math.round(volume * 100));
    }

    /** calculates the number of milliseconds until the next minute */
    function msUntilMinute(targetMinute) {
      const now = new Date();
      const almostNow = new Date(now);
      almostNow.setSeconds(0, 0);
      almostNow.setMinutes(targetMinute);
      if (almostNow <= now) {
        almostNow.setHours(almostNow.getHours() + 1);
      }
      return almostNow - now;
    }

    /** simple util fn to grab the closer of two time options */
    function getClosestTime(one, two) {
      const first = msUntilMinute(one);
      const second = msUntilMinute(two);

      return Math.min(first, second);
    }

    /** sets up uncooltoast's preferred bells */
    function setupPreferred() {
      // TODO: support localstorage and fall back to this if no local options found
      spawnPeriodic(HighBright, 30, getClosestTime(15, 45));
      spawnPeriodic(BoldBright, 60, msUntilMinute(59));
      spawnPeriodic(MediumBright, 60, msUntilMinute(30));
      spawnAlarm(LowGong, '14:00');
      spawnAlarm(SingingEscalating, '15:00');
    }

    /** uses form state to inject a new periodic bell timer */
    function createTimer() {
      const bell = BELLS[accessDom('timer-bell').value];
      const minutes = parseInt(accessDom('timer-period').value);
      const volume = parseFloat(accessDom('timer-volume').value);
      const startValue = accessDom('timer-start-at').value;

      let delayMs = 0;
      if (startValue) {
        const [hour, minute] = startValue.split(':').map(Number);
        const target = new Date();
        target.setHours(hour, minute, 0, 0);
        if (target <= new Date()) target.setDate(target.getDate() + 1);
        delayMs = target - Date.now();
      }

      spawnPeriodic(bell, minutes, delayMs, volume);
    }

    /** uses form state to inject a new timed bell alarm */
    function createAlarm() {
      const timeValue = accessDom('alarm-time').value;
      if (!timeValue) return;

      spawnAlarm(
        BELLS[accessDom('alarm-bell').value],
        timeValue,
        parseFloat(accessDom('alarm-volume').value)
      );
    }

    /** cancels and removes a timer from the DOM */
    function stopTimer(id) {
      const timerIndex = activeTimers.findIndex(t => t.id === id);
      if (timerIndex !== -1) {
        clearTimeout(activeTimers[timerIndex].intervalId);
        activeTimers.splice(timerIndex, 1);
      }
      accessDom('timer-' + id)?.remove();
    }

    /** cancels and removes all timers from the DOM */
    function stopAll() {
      for (const timer of [...activeTimers]) stopTimer(timer.id);
      BELLS.forEach(bell => bell.shhhhh());
    }

    /** toggles the open state of a panel (opens/closes it) */
    function togglePanel(id) {
      accessDom(id).classList.toggle('open');
    }

    let bellInfoIndex = 0;

    /** shows/hides the bell info pane */
    function toggleBellInfo() {
      const carousel = accessDom('bell-info-carousel');
      if (carousel.hidden) {
        renderBellInfo();
        carousel.hidden = false;
      } else {
        carousel.hidden = true;
      }
    }

    /** updates selected view in the bell info pane */
    function renderBellInfo() {
      const bellKeys = Object.keys(BELLS);
      const bell = BELLS[bellKeys[bellInfoIndex]];
      const descriptions = Array.isArray(bell.authorDescription)
        ? bell.authorDescription : [bell.authorDescription];

      accessDom('bell-info-label').textContent =
        `${ bellInfoIndex + 1 } / ${ bellKeys.length }`;
      accessDom('bell-info-card').innerHTML =
      `<p><i>"${ bell.authorName }"</i> -- <strong>created by <a href="${ bell.originalSource }" target="_blank" rel="noopener">${ bell.author }</a></strong>, license: <a href="${ bell.licenseUrl }" target="_blank" rel="noopener">${ bell.license }</a></p>` +
      descriptions.map(d => `<p>${ d }</p>`).join('') +
      `<p>Uncool Toast calls it: <strong>${ bell.label }</strong></p>`;
    }

    /** handle click on bell info pane nav */
    function bellInfoNav(dir) {
      const bellKeys = Object.keys(BELLS);
      bellInfoIndex = (bellInfoIndex + dir + bellKeys.length) % bellKeys.length;
      renderBellInfo();
    }

    /** adds a new bell timer to the accessDom */
    function spawnTimer(id, label, periodLabel, volumePct) {
      const list = accessDom('active-timers');
      const item = document.createElement('div');
      item.className = 'timer-item';
      item.id = 'timer-' + id;
      item.innerHTML =
        `<span>${ label } ▪ ${ periodLabel } ▪ ${ volumePct }%</span>` +
        `<span id="countdown-${ id }"></span>` +
        `<button class="stop-btn" onclick="stopTimer(${ id })">DESTROY</button>`;
      list.appendChild(item);
      updateCountdowns();
    }
  </script>
</head>
