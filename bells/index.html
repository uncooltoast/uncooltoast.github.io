<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uncool Toast's What even is time????</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: auto;
    }

    body {
      background-color: #ffb347;
      background-image: linear-gradient(319deg, #ffb347 0%, #ff6801 37%, #F6C324 100%);
      color: rgb(139, 69, 19);
      font-family: sans-serif;
    }

    .uncool-toast-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      aspect-ratio: 480/440;
      max-height: 100vh;
      max-width: calc(100vh * 480/440);
      margin: auto;
    }

    .uncool-toast-container {
      position: relative;
    }

    .content {
      position: fixed;
      top: 0%;
      left: 0%;
      width: 100%;
      height: 100%;
      display: flex;
      flex-flow: column nowrap;
      justify-content: flex-start;
      align-items: center;
      gap: 3rem;
      text-align: center;
      padding: 3rem 1rem 1rem;
      box-sizing: border-box;
      overflow-y: auto;
    }

    h1, p {
      font-size: 3rem;
      line-height: 4rem;
      text-shadow:
        1rem -1rem 2rem rgb(248, 213, 138),
        -1rem 1rem 2rem rgb(248, 213, 138),
        1rem 1rem 2rem rgb(255, 250, 190),
        -1rem -1rem 2rem rgb(255, 250, 190);
    }

    p {
      font-size: 1.5rem;
      line-height: 2.5rem;
    }

    .timer-creator {
      display: flex;
      flex-flow: column nowrap;
      justify-content: center;
      gap: 0.8rem;
      padding: 1rem;
      border: 1px solid rgb(139, 69, 19);
      box-shadow:
        1rem -1rem 2rem rgb(248, 213, 138),
        -1rem 1rem 2rem rgb(248, 213, 138),
        1rem 1rem 2rem rgb(255, 250, 190),
        -1rem -1rem 2rem rgb(255, 250, 190);
      background-color: rgba(255, 250, 190, 0.45);
      margin-bottom: 4rem;
    }

    .timer-form {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-end;
      gap: 0.8rem;
    }

    .timer-form select {
      background: rgba(255, 240, 200, 0.7);
      border: 1px solid rgba(139, 69, 19, 0.35);
      border-radius: 4px;
      padding: 0.3rem 0.5rem;
      cursor: pointer;
    }

    .timer-field {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.2rem;
    }

    .create-btn {
      color: rgb(255, 240, 200);
      background: rgba(139, 69, 19, 0.65);
      border: none;
      border-radius: 4px;
      padding: 0.35rem 0.9rem;
      cursor: pointer;
    }

    .create-btn:hover {
      background: rgba(139, 69, 19, 1);
    }

    .add-btns {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .creator-panel {
      display: none;
      position: relative;
      width: 100%;
    }

    .creator-panel.open {
      display: block;
    }

    .creator-panel-header {
      display: flex;
      flex-flow: row wrap;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      cursor: pointer;
      user-select: none;
    }

    .close-panel-btn {
      font-size: 2rem;
      line-height: 2.5rem;
      color: rgb(139, 69, 19);
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .active-timers {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }

    .timer-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: rgba(255, 240, 200, 0.45);
      border: 1px solid rgba(139, 69, 19, 0.2);
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
    }

    .stop-btn {
      background: transparent;
      border: 1px solid rgba(139, 69, 19, 0.35);
      border-radius: 4px;
      cursor: pointer;
      padding: 0.4rem;
    }

    .stop-btn:hover {
      background: rgba(139, 69, 19, 0.12);
    }

    .optional {
      font-style: italic;
    }

    .time-input-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    input[type="time"] {
      color: rgb(139, 69, 19);
      background: rgba(255, 240, 200, 0.7);
      border: 1px solid rgba(139, 69, 19, 0.35);
      border-radius: 4px;
      padding: 0.3rem 0.5rem;
      cursor: pointer;
    }

    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      padding: 0.4rem 1rem;
      background: rgba(120, 50, 0, 0.18);
      backdrop-filter: blur(4px);
      font-weight: bold;
    }

    nav a {
      color: rgb(255, 240, 200);
      text-decoration: none;
    }

    nav a:hover {
      color: rgb(139, 69, 19);
      text-decoration: underline;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2rem;
        line-height: 3rem;
      }

      p {
        font-size: 1.2rem;
        line-height: 1.8rem;
      }

      .timer-creator {
        margin-bottom: 10rem;
      }

      nav {
        flex-flow: column nowrap;
        gap: 0.6rem;
      }
    }
  </style>
  <script>
    // #region bell shenanigans
    /** simple class to represent a bell */
    class Bell {
      constructor({ src, label, defaultVolume, authorDescription, originalSource, license, licenseUrl }) {
        this.src = src;
        this.label = label;
        this.defaultVolume = defaultVolume;
        this.authorDescription = authorDescription;
        this.originalSource = originalSource;
        this.license = license;
        this.licenseUrl = licenseUrl;
        this.player = new Audio(src);
        this.player.volume = defaultVolume;
      }

      ring(volume) {
        this.player.currentTime = 0;
        this.player.volume = volume ?? this.defaultVolume;
        this.player.play();
      }

      shhhhh() {
        this.player.pause();
      }
    }

    const LowGong = new Bell({
      // sauce deets
      author: 'tec_studio',
      authorDescription: [
        'Sound of a 1200 lbs. Japanese Temple Bell. Cast in 1532 and made of bronze. Recording from 2023 New Years Public bell ringing ceremony. San Francisco. medium receding tone. Mono'
      ],
      license: 'CC0',
      licenseUrl: 'https://creativecommons.org/publicdomain/zero/1.0/',
      originalSource: 'https://freesound.org/people/tec_studio/sounds/668647/',

      // uncooltoast bell ringer deets
      src: '../assets/12s-low-gong-cc0-from-freesound.org-tec_studio-sounds-668647.mp3',
      label: 'STRIKE: low gong (12s)',
      defaultVolume: 0.4,
    });

    const MediumBright = new Bell({
      // sauce deets
      author: 'fauxpress',
      authorDescription: ['Single stroke of small meditation bell with resonance following.'],
      originalSource: 'https://freesound.org/people/fauxpress/sounds/42095/',
      license: 'CC0',
      licenseUrl: 'https://creativecommons.org/publicdomain/zero/1.0/',

      // uncooltoast bell ringer deets
      label: 'STRIKE: bright medium tibetan bell (30s)',
      defaultVolume: 0.4,
      src: '../assets/30s-bright-medium-tibetan-bell-cc0-from-freesound.org-fauxpress-sounds-42095.mp3',
    });

    const HighBright = new Bell({
      // sauce deets
      author: 'edgepixel',
      authorDescription: [
        'A nice crisp sound, rather high-pitched. Not too loud, not too harsh, in a small mp3 file.'
      ],
      license: 'CC0',
      licenseUrl: 'https://creativecommons.org/publicdomain/zero/1.0/',
      originalSource: 'https://freesound.org/people/edgepixel/sounds/451229/',

      // uncooltoast bell ringer deets
      src: '../assets/6s-bright-high-bell-strike-cc0-from-freesound.org-edgepixel-sounds-451229.mp3',
      label: 'STRIKE: bright high bell (6s)',
      defaultVolume: 0.4,
    });

    const BoldBright = new Bell({
      // sauce deets
      author: 'ryancacophony',
      authorDescription: ['hitting my singing bowl'],
      originalSource: 'https://freesound.org/people/ryancacophony/sounds/202017/',
      license: 'CC0',
      licenseUrl: 'https://creativecommons.org/publicdomain/zero/1.0/',

      // uncooltoast bell ringer deets
      src: '../assets/43s-tibetan-singing-bowl-big-strike-cc0-from-freesound.org-ryancacophony-sounds-202017.mp3',
      label: 'STRIKE: tibetan singing bowl (43s)',
      defaultVolume: 0.3,
    });

    const SingingEscalating = new Bell({
      // sauce deets
      author: 'SamuelGremaud',
      authorDescription: [
        'Sound of traditional Tibetan singing bowl. Sound recorded with a ZOOM H4N Pro.',
        'Son d’un bol tibétain traditionnel. Son enregistré avec un ZOOM H4N Pro.',
        'My sounds are licensed under the Creative Commons 0 License but it would be a pleasure for me to hear your work so doesn’t hesitate to comment or to send me a message with your work :)',
        'Passionné de musique, je pratique le field recording et la captation de sons pour occuper mon temps libre. J\'espère que mes sons vous plairont et qu\'ils vous seront utiles !',
      ],
      license: 'CC0',
      licenseUrl: 'https://creativecommons.org/publicdomain/zero/1.0/',
      originalSource: 'https://freesound.org/people/SamuelGremaud/sounds/518705/',

      // uncooltoast bell ringer deets
      src: '../assets/60s-escalating-tibetan-singing-bowl-cc0-from-freesound.org-SamuelGremaud-sounds-518705.mp3',
      label: 'SINGING: tibetan singing bowl, escalating (60s)',
      defaultVolume: 0.4,
    });

    const SingingGentle = new Bell({
      // sauce deets
      author: 'steffcaffrey',
      authorDescription: [
        'Tibetan singing bowl played with soft mallet.',
        'Low cut for ya n all.',
        'Rode NTK mic as per usual.',
        'Namaste!'
      ],
      originalSource: 'https://freesound.org/people/steffcaffrey/sounds/449950/',
      license: 'CC0',
      licenseUrl: 'https://creativecommons.org/publicdomain/zero/1.0/',

      // uncooltoast bell ringer deets
      src: '../assets/57s-tibetan-singing-bowl-cc0-from-freesound.org-steffcaffrey-sounds-449950.mp3',
      label: 'SINGING: tibetan singing bowl (57s)',
      defaultVolume: 0.6,
    });
    
    const BELLS = { LowGong, MediumBright, HighBright, BoldBright, SingingEscalating, SingingGentle };
    // #endregion bell shenanigans

    /** switches the bell for a given player */
    function switchBell(playerId, whichBell) {
      const bell = BELLS[whichBell];
      const player = document.getElementById(playerId);
      player.pause();
      player.src = bell.src;
      player.load();
      player.volume = bell.defaultVolume;
      const prefix = playerId.replace('-preview-player', '');
      setFormValue(prefix + '-volume', String(bell.defaultVolume));
    }

    /** sets the volume of a given player */
    function setPreviewVolume(id, value) {
      document.getElementById(id).volume = parseFloat(value);
    }

    /** sets the value of a given form element */
    function setFormValue(id, value) {
      document.getElementById(id).value = value;
    }

    /** clears all form state, mostly necessary to avoid weird state issues on page reload */
    function resetPageState() {
      document.querySelectorAll('form').forEach(f => f.reset());
      document.querySelectorAll('select').forEach(s => { s.selectedIndex = 0; });

      switchBell('timer-preview-player', 'HighBright');
      setFormValue('timer-bell', 'HighBright');
      setFormValue('timer-period', '30');
      setFormValue('timer-volume', '0.4');
      setFormValue('timer-start-at', '');
      setPreviewVolume('timer-preview-player', 0.4);

      switchBell('alarm-preview-player', 'HighBright');
      setFormValue('alarm-bell', 'HighBright');
      setFormValue('alarm-volume', '0.4');
      setFormValue('alarm-time', '');
      setPreviewVolume('alarm-preview-player', 0.4);
    }

    document.addEventListener('DOMContentLoaded', resetPageState);

    const activeTimers = [];

    /** formats milliseconds into a friendlier time string */
    function formatCountdown(ms) {
      const seconds = Math.max(0, Math.ceil(ms / 1000));
      const hour = Math.floor(seconds / 3600);
      const minute = Math.floor((seconds % 3600) / 60);
      const second = seconds % 60;
      if (hour > 0) return hour + ':' + String(minute).padStart(2, '0') + ':' + String(second).padStart(2, '0');
      return minute + ':' + String(second).padStart(2, '0');
    }

    /** updates the countdown display for all active timers */
    function updateCountdowns() {
      const now = Date.now();
      for (const timer of activeTimers) {
        const element = document.getElementById('countdown-' + timer.id);
        if (element) element.textContent = formatCountdown(timer.nextRing - now);
      }
    }

    setInterval(updateCountdowns, 1000);

    let spawnCounter = 0;

    /** creates a new periodic bell timer */
    function spawnPeriodic(bell, minutes, delayMs, volume) {
      const periodMs = minutes * 60 * 1000;
      const id = Date.now() + (spawnCounter++);
      const nextRing = Date.now() + (delayMs > 0 ? delayMs : periodMs);
      let intervalId;

      const ringBell = () => bell.ring(volume);

      if (delayMs > 0) {
        intervalId = setTimeout(() => {
          ringBell();
          const entry = activeTimers.find(t => t.id === id);
          if (!entry) return;
          entry.nextRing = Date.now() + periodMs;
          const intervalId = setInterval(() => {
            ringBell();
            const entry = activeTimers.find(t => t.id === id);
            if (entry) { entry.nextRing = Date.now() + periodMs; entry.intervalId = intervalId; }
          }, periodMs);
          entry.intervalId = intervalId;
        }, delayMs);
      } else {
        intervalId = setInterval(() => {
          ringBell();
          const entry = activeTimers.find(t => t.id === id);
          if (entry) entry.nextRing = Date.now() + periodMs;
        }, periodMs);
      }

      activeTimers.push({ id, intervalId, nextRing, oneShot: false });
      const periodLabel = `every ${ minutes } min`;
      spawnTimer(id, bell.label, periodLabel, Math.round(volume * 100));
    }

    /** creates a new timed bell alarm */
    function spawnAlarm(bell, timeStr, volume) {
      const [hours, mins] = timeStr.split(':').map(Number);
      const now = new Date();
      const target = new Date(now);
      target.setHours(hours, mins, 0, 0);
      if (target <= now) target.setDate(target.getDate() + 1);
      const delayMs = target - now;

      const id = Date.now() + (spawnCounter++);
      const nextRing = Date.now() + delayMs;

      const timeoutId = setTimeout(() => {
        bell.ring(volume);
        stopTimer(id);
      }, delayMs);

      activeTimers.push({ id, intervalId: timeoutId, nextRing, oneShot: true });
      const displayTime = target.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      spawnTimer(id, bell.label, `at ${ displayTime }`, Math.round(volume * 100));
    }

    /** calculates the number of milliseconds until the next minute */
    function msUntilMinute(targetMinute) {
      const now = new Date();
      const almostNow = new Date(now);
      almostNow.setSeconds(0, 0);
      almostNow.setMinutes(targetMinute);
      if (almostNow <= now) {
        almostNow.setHours(almostNow.getHours() + 1);
      }
      return almostNow - now;
    }

    /** sets up uncooltoast's preferred bells */
    function setupPreferred() {
      spawnPeriodic(BoldBright, 60, msUntilMinute(59), 0.4);
      spawnPeriodic(HighBright, 60, msUntilMinute(15), 0.4);
      spawnPeriodic(HighBright, 60, msUntilMinute(45), 0.4);
      spawnPeriodic(MediumBright, 60, msUntilMinute(30), 0.4);
      spawnAlarm(LowGong, '14:00', 0.4);
      spawnAlarm(SingingEscalating, '15:00', 0.4);
    }

    /** uses form state to inject a new periodic bell timer */
    function createTimer() {
      const bell = BELLS[document.getElementById('timer-bell').value];
      const minutes = parseInt(document.getElementById('timer-period').value);
      const volume = parseFloat(document.getElementById('timer-volume').value);
      const startValue = document.getElementById('timer-start-at').value;

      let delayMs = 0;
      if (startValue) {
        const [hour, minute] = startValue.split(':').map(Number);
        const target = new Date();
        target.setHours(hour, minute, 0, 0);
        if (target <= new Date()) target.setDate(target.getDate() + 1);
        delayMs = target - Date.now();
      }

      spawnPeriodic(bell, minutes, delayMs, volume);
    }

    /** uses form state to inject a new timed bell alarm */
    function createAlarm() {
      const timeValue = document.getElementById('alarm-time').value;
      if (!timeValue) return;

      spawnAlarm(
        BELLS[document.getElementById('alarm-bell').value],
        timeValue,
        parseFloat(document.getElementById('alarm-volume').value)
      );
    }

    /** cancels and removes a timer from the DOM */
    function stopTimer(id) {
      const timerIndex = activeTimers.findIndex(t => t.id === id);
      if (timerIndex !== -1) {
        clearTimeout(activeTimers[timerIndex].intervalId);
        activeTimers.splice(timerIndex, 1);
      }
      document.getElementById('timer-' + id)?.remove();
    }

    /** cancels and removes all timers from the DOM */
    function stopAll() {
      for (const timer of [...activeTimers]) stopTimer(timer.id);
      BELLS.forEach(bell => bell.shhhhh());
    }

    /** toggles the open state of a panel (opens/closes it) */
    function togglePanel(id) {
      document.getElementById(id).classList.toggle('open');
    }

    /** adds a new bell timer to the DOM */
    function spawnTimer(id, label, periodLabel, volumePct) {
      const list = document.getElementById('active-timers');
      const item = document.createElement('div');
      item.className = 'timer-item';
      item.id = 'timer-' + id;
      item.innerHTML =
        `<span>${ label } ▪ ${ periodLabel } ▪ ${ volumePct }%</span>` +
        `<span id="countdown-${ id }"></span>` +
        `<button class="stop-btn" onclick="stopTimer(${ id })">destroy</button>`;
      list.appendChild(item);
      updateCountdowns();
    }
  </script>
</head>

<body>
  <main class="content">
    <h1>What even is time????</h1>
    <section>
      <p>Here are some bells to try to help</p>
      <div class="active-timers" id="active-timers"></div>
    </section>
    <section class="timer-creator">
      <div id="global-controls">
        <button class="stop-btn" onclick="stopAll()">
          <span class="icon">🚮</span>
          <span>DESTROY all planned bells</span>
        </button>
      </div>
      <div class="add-btns">
        <button class="create-btn" onclick="togglePanel('panel-periodic')">add periodic bell</button>
        <button class="create-btn" onclick="togglePanel('panel-timed')">add timed bell</button>
        <button class="create-btn" onclick="setupPreferred()" title="set up uncooltoast's current favorite bells">uncooltoast it</button>
      </div>
      <div class="creator-panel periodic" id="panel-periodic">
        <div class="creator-panel-header" onclick="togglePanel('panel-periodic')">
          <h2>create new periodic bell timer</h2>
          <button class="close-panel-btn" onclick="event.stopPropagation(); togglePanel('panel-periodic')" title="close create new periodic bell timer panel" aria-label="close create new periodic bell timer panel">x</button>
        </div>
        <div class="timer-form">
          <div class="timer-field">
            <label for="timer-bell">bell</label>
            <select id="timer-bell" onchange="switchBell('timer-preview-player', this.value)">
              <option value="HighBright">STRIKE: bright high bell (6s)</option>
              <option value="LowGong">STRIKE: low gong (12s)</option>
              <option value="MediumBright">STRIKE: bright medium tibetan bell (30s)</option>
              <option value="BoldBright">STRIKE: bold strike of tibetan singing bowl (43s)</option>
              <option value="SingingGentle">SINGING: tibetan singing bowl (57s)</option>
              <option value="SingingEscalating">SINGING: tibetan singing bowl, escalating (60s)</option>
            </select>
            <audio id="timer-preview-player" controls src="../assets/6s-bright-high-bell-strike-cc0-from-freesound.org-edgepixel-sounds-451229.mp3"></audio>
          </div>
          <div class="timer-field">
            <label for="timer-period">every</label>
            <select id="timer-period">
              <option value="5">5 min</option>
              <option value="10">10 min</option>
              <option value="15">15 min</option>
              <option value="20">20 min</option>
              <option value="30" selected>30 min</option>
              <option value="45">45 min</option>
              <option value="60">60 min</option>
              <option value="90">90 min</option>
            </select>
          </div>
          <div class="timer-field">
            <label for="timer-start-at">start at <span class="optional">(optional)</span></label>
            <div class="time-input-row">
              <input type="time" id="timer-start-at">
              <button class="stop-btn" onclick="setFormValue('timer-start-at', '')">clear</button>
            </div>
          </div>
          <div class="timer-field">
            <label for="timer-volume">volume</label>
            <select id="timer-volume" onchange="setFormValue('timer-volume', this.value)">
              <option value="0.1">10%</option>
              <option value="0.2">20%</option>
              <option value="0.3">30%</option>
              <option value="0.4" selected>40%</option>
              <option value="0.5">50%</option>
              <option value="0.6">60%</option>
              <option value="0.7">70%</option>
              <option value="0.8">80%</option>
              <option value="0.9">90%</option>
              <option value="1.0">100%</option>
            </select>
          </div>
          <button class="create-btn" onclick="createTimer()">create</button>
        </div>
      </div>
      <div class="creator-panel timed" id="panel-timed">
        <div class="creator-panel-header" onclick="togglePanel('panel-timed')">
          <h2>create new timed bell (good for alarms)</h2>
          <button class="close-panel-btn" onclick="event.stopPropagation(); togglePanel('panel-timed')" title="close create new timed bell timer panel" aria-label="close create new timed bell timer panel">x</button>
        </div>
        <div class="timer-form">
          <div class="timer-field">
            <label for="alarm-bell">bell</label>
            <select id="alarm-bell" onchange="switchBell('alarm-preview-player', this.value)">
              <option value="HighBright">STRIKE: bright high bell (6s)</option>
              <option value="LowGong">STRIKE: low gong (12s)</option>
              <option value="MediumBright">STRIKE: bright medium tibetan bell (30s)</option>
              <option value="BoldBright">STRIKE: tibetan singing bowl (43s)</option>
              <option value="SingingGentle">SINGING: tibetan singing bowl (57s)</option>
              <option value="SingingEscalating">SINGING: tibetan singing bowl, escalating (60s)</option>
            </select>
            <audio id="alarm-preview-player" controls src="../assets/6s-bright-high-bell-strike-cc0-from-freesound.org-edgepixel-sounds-451229.mp3"></audio>
          </div>
          <div class="timer-field">
            <label for="alarm-time">ring at</label>
            <input type="time" id="alarm-time">
          </div>
          <div class="timer-field">
            <label for="alarm-volume">volume</label>
            <select id="alarm-volume" onchange="setPreviewVolume('alarm-preview-player', this.value)">
              <option value="0.1">10%</option>
